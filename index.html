<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд заказов Nova</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 24px;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #222;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #667eea;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 { font-size: 13px; opacity: 0.9; margin-bottom: 8px; font-weight: 400; }
        .stat-card .number { font-size: 28px; font-weight: 700; }
        .filters {
            margin-bottom: 20px;
            padding: 14px;
            background: #f9f9f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filters label { font-size: 14px; color: #555; }
        select, button {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        button { background: #4CAF50; color: #fff; border: none; }
        button:hover { background: #45a049; }
        .chart-wrap { position: relative; height: 360px; margin-bottom: 24px; }
        .empty-state {
            display: none;
            text-align: center;
            padding: 48px 0;
            color: #999;
            font-size: 15px;
        }
        .order-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.6;
        }
        .order-card strong { font-size: 15px; }
        #loading { text-align: center; padding: 32px; color: #999; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Дашборд заказов Nova</h1>

    <div class="stats">
        <div class="stat-card"><h3>Всего заказов</h3><div class="number" id="totalOrders">—</div></div>
        <div class="stat-card" style="background:#764ba2"><h3>Общая выручка</h3><div class="number" id="totalRevenue">—</div></div>
        <div class="stat-card" style="background:#43a89a"><h3>Средний чек</h3><div class="number" id="avgOrderValue">—</div></div>
    </div>

    <div class="filters">
        <label>Фильтр по городу:</label>
        <select id="cityFilter">
            <option value="all">Все города</option>
            <option value="Алматы">Алматы</option>
            <option value="Астана">Астана</option>
            <option value="Шымкент">Шымкент</option>
        </select>
        <button onclick="loadData()">Обновить</button>
    </div>

    <div id="loading">Загрузка данных...</div>
    <div class="chart-wrap" style="display:none" id="chartWrap">
        <canvas id="ordersChart"></canvas>
    </div>
    <div class="empty-state" id="emptyState">Нет данных для отображения</div>

    <h3 style="margin-bottom:12px;font-size:16px">Последние заказы</h3>
    <div id="recentOrders"></div>
</div>

<script>
    const SUPABASE_URL = 'https://fzhindouhwrbrlnpbbbi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_C6K2OAqVbg5D9CEB1qtGZw_YaQy6Och';
    const { createClient } = window.supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let chart = null;

    function fmt(n) {
        return Math.round(n).toLocaleString('ru-RU');
    }

    async function loadData() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('chartWrap').style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('recentOrders').innerHTML = '';

        const cityFilter = document.getElementById('cityFilter').value;

        let query = supabase.from('orders').select('*').order('created_at', { ascending: true });
        if (cityFilter !== 'all') {
            query = query.eq('city', cityFilter);
        }

        const { data, error } = await query;
        document.getElementById('loading').style.display = 'none';

        if (error) {
            console.error('Ошибка загрузки:', error);
            document.getElementById('emptyState').textContent = 'Ошибка загрузки данных: ' + error.message;
            document.getElementById('emptyState').style.display = 'block';
            return;
        }

        if (!data || data.length === 0) {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('totalOrders').textContent = '0';
            document.getElementById('totalRevenue').textContent = '0 ₸';
            document.getElementById('avgOrderValue').textContent = '0 ₸';
            return;
        }

        const totalOrders = data.length;
        const totalRevenue = data.reduce((sum, o) => sum + (o.total_sum || 0), 0);
        const avgOrderValue = totalRevenue / totalOrders;

        document.getElementById('totalOrders').textContent = totalOrders;
        document.getElementById('totalRevenue').textContent = fmt(totalRevenue) + ' ₸';
        document.getElementById('avgOrderValue').textContent = fmt(avgOrderValue) + ' ₸';

        const ordersByDate = {};
        data.forEach(order => {
            if (!order.created_at) return;
            const key = order.created_at.slice(0, 10);
            ordersByDate[key] = (ordersByDate[key] || 0) + (order.total_sum || 0);
        });

        const dates = Object.keys(ordersByDate).sort(); 
        const revenues = dates.map(d => ordersByDate[d]);

        const labels = dates.map(d => {
            const [y, m, day] = d.split('-');
            return `${day}.${m}.${y}`;
        });

        document.getElementById('chartWrap').style.display = 'block';
        if (chart) chart.destroy();

        const ctx = document.getElementById('ordersChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Выручка (₸)',
                    data: revenues,
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.15)',
                    tension: 0.3,
                    pointRadius: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    title: { display: true, text: 'Динамика выручки по дням' }
                },
                scales: {
                    y: {
                        ticks: {
                            callback: v => fmt(v) + ' ₸'
                        }
                    }
                }
            }
        });

        const recent = data.slice(-5).reverse();
        document.getElementById('recentOrders').innerHTML = recent.map(o => `
            <div class="order-card">
                <strong>${o.first_name || ''} ${o.last_name || ''}</strong><br>
                ${o.city || 'Город не указан'} &nbsp;|&nbsp; ${fmt(o.total_sum || 0)} ₸<br>
                <span style="color:#999;font-size:13px">${o.created_at ? new Date(o.created_at).toLocaleString('ru-RU') : '—'}</span>
            </div>
        `).join('');
    }

    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
